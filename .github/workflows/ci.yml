name: Node.js CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-job:
    runs-on: ubuntu-latest

    steps:
      - name: Kodni yuklab olish (Checkout)
        uses: actions/checkout@v4

      - name: Node.js o'rnatish
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Kutubxonalarni o'rnatish
        run: npm install

      - name: Testlarni ishga tushirish
        run: npm test
